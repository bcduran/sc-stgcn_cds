name: gnn_thesis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # --- Scientific core ---
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3

  # --- Visualization ---
  - matplotlib>=3.7
  - seaborn>=0.13

  # --- Data I/O ---
  - openpyxl>=3.1
  - requests>=2.31

  # --- Dev tools ---
  - ipykernel>=6.25
  - jupyter
  - pytest>=7.4

  # --- pip-only packages ---
  - pip:
    - torch>=2.1
    # CUDA kullanıyorsan üstteki satırı sil, aşağıdakini aç:
    # - torch --index-url https://download.pytorch.org/whl/cu121
    - xgboost>=2.0
    - statsmodels>=0.14
    - networkx>=3.1
    - beautifulsoup4>=4.12
    - black>=23.0
    - isort>=5.12
    # - nodevectors>=0.9   # Node2Vec için
    # - vectorbt>=0.26     # Portfolio analytics için
